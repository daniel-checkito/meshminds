<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Score calibration – MeshMinds</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@500;700&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1a1a;--ink2:#3a3a3a;--ink3:#7a7a7a;--line:#e7e5e1;--line2:#cfcdc8;--surf:#fafaf7;--surf2:#f1efe9;--acc:#ff5c00;--good:#15803d;--bad:#b91c1c}
  *{box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;color:var(--ink);background:#fdfcfa;margin:0;padding:24px 16px 80px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:780px;margin:0 auto}
  h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:.02em;line-height:1;margin:0 0 4px}
  .lead{font-size:14px;color:var(--ink3);margin-bottom:18px;line-height:1.5}
  .lead b{color:var(--ink)}
  .gate-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;margin-bottom:14px}
  .gate-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input[type="text"],input[type="password"],input[type="number"]{font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;border:1px solid var(--line2);border-radius:9px;outline:none;background:#fff}
  input:focus{border-color:var(--acc)}
  button{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;padding:9px 16px;border:none;border-radius:9px;cursor:pointer;background:var(--acc);color:#fff}
  button.secondary{background:#1a1a1a}
  button.ghost{background:transparent;color:var(--ink2);border:1px solid var(--line)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .count{font-size:12.5px;color:var(--ink3)}
  .count b{color:var(--ink)}
  .card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:10px}
  .card-top{display:flex;gap:12px;align-items:flex-start}
  .thumb{width:56px;height:56px;border-radius:9px;background:var(--surf2) center/cover no-repeat;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ink3);border:1px solid var(--line)}
  .body{flex:1;min-width:0}
  .name{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:4px;word-break:break-word}
  .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .pill{font-family:'DM Mono',monospace;font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px}
  .pill.g{background:#dcfce7;color:#15803d}.pill.y{background:#fef9c3;color:#854d0e}.pill.r{background:#fee2e2;color:#991b1b}
  .verdict{font-size:12.5px;color:var(--ink3);line-height:1.35}
  .url{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--acc);text-decoration:none;display:inline-block;margin-top:2px;word-break:break-all}
  .url:hover{text-decoration:underline}
  .cal{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:12px;margin-top:12px;border-top:1px dashed var(--line)}
  .cal label{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);flex-shrink:0}
  .cal input.score{width:90px}
  .cal input.reason{flex:1;min-width:180px}
  .ok{font-size:11.5px;color:var(--good);font-weight:700;display:none}
  .err{font-size:12px;color:var(--bad);font-weight:600;margin-top:8px;display:none}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:100}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:13.5px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Score calibration</h1>
  <p class="lead">For every scan below, type the score it <b>should</b> have plus one line explaining why. Click <b>Save</b>. When you're done, hit <b>Export</b> at the top to download a JSON to paste into Claude.</p>

  <div id="app">
    <div class="topbar">
      <div class="count" id="count">Loading scans…</div>
      <div style="display:flex;gap:6px">
        <button class="ghost" onclick="reload()">Reload</button>
        <button class="secondary" onclick="exportJson()">Export for Claude →</button>
      </div>
    </div>
    <div id="list"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';

const cache = { ideas: [] };

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function scorePillCls(s){if(s==null)return '';if(s>=70)return 'g';if(s>=50)return 'y';return 'r';}
function fmtDate(d){if(!d)return '';try{const x=new Date(d);return x.toLocaleDateString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(_){return ''}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

async function api(path,opts){
  opts=opts||{};
  opts.headers={'Content-Type':'application/json',...(opts.headers||{})};
  const sep=path.includes('?')?'&':'?';
  const url=path+sep+'calibrate=1';
  const r=await fetch(url,opts);
  if(!r.ok){
    let msg='Request failed ('+r.status+')';
    try{const j=await r.json();msg=j.error||msg;}catch(_){}
    throw new Error(msg);
  }
  return r.json();
}

async function load(){
  try{
    const data=await api('/api/account/ideas');
    cache.ideas=data.ideas||[];
    render();
  }catch(e){
    document.getElementById('count').textContent='Error: '+e.message;
  }
}

function render(){
  const list=document.getElementById('list');
  const count=document.getElementById('count');
  if(!cache.ideas.length){
    count.textContent='0 scans';
    list.innerHTML='<div class="empty">No scans yet. Run a few on /idea, then come back.</div>';
    return;
  }
  count.innerHTML='<b>'+cache.ideas.length+'</b> scan'+(cache.ideas.length===1?'':'s')+' loaded · most recent first';
  list.innerHTML=cache.ideas.map(function(i){
    const cls=scorePillCls(i.score);
    const cal=i.calibration||{};
    const calScore=cal.suggestedScore!=null?cal.suggestedScore:'';
    const calReason=cal.reason||'';
    const thumb=i.image_url
      ?'<div class="thumb" style="background-image:url(\''+escH(i.image_url)+'\')"></div>'
      :'<div class="thumb">🖼</div>';
    return '<div class="card" id="card-'+i.id+'">'
      +'<div class="card-top">'+thumb
      +'<div class="body">'
      +'<div class="name">'+escH(i.title||'(no title)')+'</div>'
      +'<div class="meta">'
      +(i.score!=null?'<span class="pill '+cls+'">AI: '+i.score+'</span>':'')
      +'<span class="verdict">'+escH(i.verdict||'')+'</span>'
      +'</div>'
      +(i.url?'<a class="url" href="'+escH(i.url)+'" target="_blank" rel="noopener">'+escH(i.url)+'</a>':'')
      +'<div style="font-size:11px;color:var(--ink3);margin-top:3px">'+fmtDate(i.created_at)+'</div>'
      +'</div></div>'
      +'<div class="cal">'
      +'<label>Should be</label>'
      +'<input type="number" min="0" max="100" class="score" id="s-'+i.id+'" value="'+escH(calScore)+'" placeholder="0-100">'
      +'<input type="text" class="reason" id="r-'+i.id+'" maxlength="500" value="'+escH(calReason)+'" placeholder="One-line reason (e.g. \'too low — repeat-buyer niche, simple SEO\')">'
      +'<button onclick="save(\''+i.id+'\')">Save</button>'
      +'<span class="ok" id="ok-'+i.id+'">✓ Saved</span>'
      +'</div>'
      +'</div>';
  }).join('');
}

async function save(id){
  const sEl=document.getElementById('s-'+id);
  const rEl=document.getElementById('r-'+id);
  const okEl=document.getElementById('ok-'+id);
  const suggestedScore=sEl.value===''?null:Number(sEl.value);
  const reason=(rEl.value||'').trim();
  if(suggestedScore===null && !reason){toast('Enter a score or a reason');return;}
  try{
    await api('/api/account/ideas',{
      method:'POST',
      body:JSON.stringify({action:'calibrate',id,suggestedScore,reason,calibrate:true}),
    });
    const idea=cache.ideas.find(x=>x.id===id);
    if(idea)idea.calibration={suggestedScore,reason};
    okEl.style.display='';
    setTimeout(()=>{okEl.style.display='none';},1800);
  }catch(e){
    toast('Save failed: '+e.message);
  }
}

async function exportJson(){
  try{
    const data=await api('/api/account/ideas?export=calibrations');
    if(!data.count){toast('Save at least one calibration first');return;}
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='calibrations-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
    toast('Exported '+data.count+' calibration'+(data.count===1?'':'s'));
  }catch(e){
    toast('Export failed: '+e.message);
  }
}

function reload(){load();}

window.save=save;window.exportJson=exportJson;window.reload=reload;

load();
</script>
</body>
</html>
