<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintChecker - Dashboard</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#FF5C00;--ink:#0a0a0a;--ink2:#555;--ink3:#888;--line:#e5e2dd;--line2:#d4d0ca;--surf:#f7f5f2;--surf2:#eeece9;--good:#15803d;--bad:#b91c1c;--warn:#b45309}
html,body{min-height:100%;background:var(--surf);font-family:"Manrope",sans-serif;color:var(--ink)}

.phone{width:100%;max-width:430px;min-height:100vh;margin:0 auto;background:#fff;display:flex;flex-direction:column}

.hdr{padding:14px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.04em;display:flex;align-items:center;gap:5px;text-decoration:none;color:var(--ink)}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--acc)}
.hdr-back{font-family:"DM Mono",monospace;font-size:11px;color:var(--ink3);text-decoration:none;display:flex;align-items:center;gap:5px}
.hdr-back:hover{color:var(--acc)}

.content{flex:1;padding:20px 16px 40px;display:flex;flex-direction:column;gap:20px}

.section-lbl{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--line)}

/* Quota card */
.quota-card{background:var(--surf);border:1.5px solid var(--line2);border-radius:14px;padding:16px;display:flex;gap:14px;align-items:center}
.quota-info{flex:1;min-width:0}
.quota-label{font-size:12px;color:var(--ink3);font-weight:600;margin-bottom:4px}
.quota-count{font-family:"Bebas Neue",sans-serif;font-size:32px;line-height:1;color:var(--ink);margin-bottom:6px}
.quota-bar-wrap{height:6px;background:var(--line2);border-radius:3px;overflow:hidden}
.quota-bar-fill{height:100%;border-radius:3px;background:var(--acc);transition:width .4s}
.quota-bar-fill.warn{background:var(--warn)}
.quota-bar-fill.danger{background:var(--bad)}
.quota-upgrade{display:inline-block;margin-top:8px;font-family:"DM Mono",monospace;font-size:10px;color:var(--acc);cursor:pointer;border:none;background:none;padding:0;letter-spacing:.03em}

/* Scan history */
.scan-list{display:flex;flex-direction:column;gap:8px}
.scan-card{background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:center}
.scan-score{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:"DM Mono",monospace;font-size:12px;font-weight:700}
.scan-score.good{background:#dcfce7;color:var(--good)}
.scan-score.ok{background:#fef9c3;color:var(--warn)}
.scan-score.bad{background:#fee2e2;color:var(--bad)}
.scan-info{flex:1;min-width:0}
.scan-title{font-size:13px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.scan-meta{font-size:11px;color:var(--ink3)}
.scan-verdict{font-size:11px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.scan-empty{text-align:center;padding:30px 16px;color:var(--ink3);font-size:13px;line-height:1.6}

/* Account */
.acct-section{display:flex;flex-direction:column;gap:8px}
.acct-row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surf);border:1px solid var(--line);border-radius:12px}
.acct-row-icon{font-size:16px;width:32px;text-align:center;flex-shrink:0}
.acct-row-label{flex:1;font-size:13px;font-weight:600;color:var(--ink)}
.acct-row-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.acct-row-btn{font-family:"DM Mono",monospace;font-size:10px;color:var(--acc);background:none;border:none;cursor:pointer;padding:0;letter-spacing:.03em;flex-shrink:0}

/* Password form */
.pw-form{padding:14px;background:var(--surf);border:1px solid var(--line);border-radius:12px;display:none}
.pw-form.open{display:block}
.pw-field{margin-bottom:12px}
.pw-field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink2);margin-bottom:5px}
.pw-field input{width:100%;border:1.5px solid var(--line2);border-radius:9px;padding:10px 12px;font-family:"Manrope",sans-serif;font-size:14px;color:var(--ink);outline:none;background:#fff;transition:border-color .2s}
.pw-field input:focus{border-color:var(--acc)}
.pw-msg{font-size:12px;margin-top:10px;padding:8px 10px;border-radius:8px;display:none;line-height:1.5}
.pw-msg.error{background:#fef2f2;color:var(--bad);border:1px solid #fca5a5;display:block}
.pw-msg.success{background:#f0fdf4;color:var(--good);border:1px solid #86efac;display:block}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:"Manrope",sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--acc);border:1.5px solid var(--acc)}

/* Auth gate */
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink2);margin-bottom:5px}
.auth-field input{width:100%;border:1.5px solid var(--line2);border-radius:9px;padding:11px 13px;font-family:"Manrope",sans-serif;font-size:15px;color:var(--ink);outline:none;background:#fff;transition:border-color .2s}
.auth-field input:focus{border-color:var(--acc)}
.auth-msg{font-size:12px;margin-top:12px;padding:9px 11px;border-radius:8px;line-height:1.5;display:none}
.auth-msg.error{background:#fef2f2;color:var(--bad);border:1px solid #fca5a5;display:block}
.auth-msg.success{background:#f0fdf4;color:var(--good);border:1px solid #86efac;display:block}
</style>
</head>
<body>
<div class="phone">

  <div class="hdr">
    <a href="/idea-test" class="hdr-back">← Back</a>
    <a href="/idea-test" class="logo"><span class="logo-dot"></span>PrintChecker</a>
    <div style="width:50px"></div>
  </div>

  <div class="content">

    <div id="auth-loading" style="text-align:center;padding:60px 20px;color:var(--ink3);font-size:14px">Loading…</div>

    <!-- Auth gate: shown when not logged in -->
    <div id="auth-gate" style="display:none;text-align:center">
      <p style="font-size:24px;margin-bottom:8px">🔒</p>
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:28px;margin-bottom:8px;text-align:left">Sign in to view your dashboard</h2>
      <p style="font-size:13px;color:var(--ink2);margin-bottom:24px;line-height:1.5;text-align:left">Your scan history and account settings live here.</p>
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="g-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="g-pwd" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="g-btn" onclick="gateSignIn()">
        <span>Sign in</span>
      </button>
      <div class="auth-msg" id="g-msg"></div>
      <p style="font-size:12px;color:var(--ink3);margin-top:14px">No account? <a href="/idea-test" style="color:var(--acc)">Create one on PrintChecker →</a></p>
    </div>

    <!-- Dashboard: shown when logged in -->
    <div id="dash-content" style="display:none;flex-direction:column;gap:20px">

      <!-- Quota -->
      <div>
        <div class="section-lbl">Scans this month</div>
        <div class="quota-card">
          <canvas id="quota-canvas" width="60" height="60" style="flex-shrink:0"></canvas>
          <div class="quota-info">
            <div class="quota-label" id="quota-label">Free plan</div>
            <div class="quota-count"><span id="quota-left">-</span> <span style="font-size:16px;color:var(--ink3)">scans left</span></div>
            <div class="quota-bar-wrap">
              <div class="quota-bar-fill" id="quota-bar" style="width:0%"></div>
            </div>
            <button class="quota-upgrade" id="quota-upgrade-btn" style="display:none" onclick="alert('Stripe coming soon - DM @meshminds3d on Instagram to get early access!')">Upgrade to 250/month →</button>
          </div>
        </div>
      </div>

      <!-- Scan history -->
      <div>
        <div class="section-lbl">Recent scans</div>
        <div class="scan-list" id="scan-list">
          <div class="scan-empty">Loading your scans…</div>
        </div>
      </div>

      <!-- Account settings -->
      <div>
        <div class="section-lbl">Account</div>
        <div class="acct-section">
          <div class="acct-row">
            <span class="acct-row-icon">📧</span>
            <div style="flex:1;min-width:0">
              <div class="acct-row-label" id="acct-email-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">-</div>
              <div class="acct-row-sub">Signed-in email</div>
            </div>
          </div>
          <div class="acct-row" onclick="togglePwForm()" style="cursor:pointer">
            <span class="acct-row-icon">🔑</span>
            <div style="flex:1">
              <div class="acct-row-label">Change password</div>
            </div>
            <button class="acct-row-btn" onclick="togglePwForm();event.stopPropagation()">Change</button>
          </div>
          <div class="pw-form" id="pw-form">
            <div class="pw-field">
              <label>New password</label>
              <input type="password" id="pw-new" placeholder="New password (min 6 characters)" autocomplete="new-password">
            </div>
            <div class="pw-field">
              <label>Confirm new password</label>
              <input type="password" id="pw-confirm" placeholder="Repeat new password" autocomplete="new-password">
            </div>
            <button class="btn ghost" onclick="changePassword()" id="pw-btn" style="padding:11px 16px;font-size:14px">
              <span>Update password</span>
            </button>
            <div class="pw-msg" id="pw-msg"></div>
          </div>
          <div class="acct-row" onclick="doSignOut()" style="cursor:pointer">
            <span class="acct-row-icon">🚪</span>
            <div style="flex:1">
              <div class="acct-row-label" style="color:var(--bad)">Sign out</div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /dash-content -->

  </div><!-- /content -->

</div><!-- /phone -->

<script>
var SURL='https://jzpresjqxqnmjengmdgg.supabase.co';
var SKEY='sb_publishable_gM1DHFqmuvu4WCQjlDXcjg_Gq1iPUhV';
var FREE_LIMIT=10;
var sb=supabase.createClient(SURL,SKEY);
var authUser=null,userProfile=null;

function q(id){return document.getElementById(id);}
function showMsg(el,type,msg){el.className=(type?'auth-msg '+type:'pw-msg '+type);el.textContent=msg;}

sb.auth.getSession().then(function(res){
  var session=res.data&&res.data.session;
  q('auth-loading').style.display='none';
  if(!session){
    q('auth-gate').style.display='';
    return;
  }
  authUser=session.user;
  loadDashboard();
});

function loadDashboard(){
  var dc=q('dash-content');
  dc.style.display='flex';

  q('acct-email-label').textContent=authUser.email||'';

  sb.from('profiles').select('*').eq('id',authUser.id).single().then(function(res){
    userProfile=res.data;
    renderQuota();
  });

  sb.from('scans').select('*').eq('user_id',authUser.id).order('created_at',{ascending:false}).limit(10).then(function(res){
    renderScans(res.data||[]);
  });
}

function renderQuota(){
  var used=userProfile?userProfile.free_scans_used:0;
  var isPrem=userProfile&&userProfile.is_premium;
  var limit=isPrem?250:FREE_LIMIT;
  var left=Math.max(0,limit-used);
  var pct=limit>0?Math.min(100,Math.round((used/limit)*100)):0;

  q('quota-label').textContent=isPrem?'Premium plan · 250 scans':'Free plan · 10 scans total';
  q('quota-left').textContent=left;

  var bar=q('quota-bar');
  bar.style.width=pct+'%';
  bar.className='quota-bar-fill'+(left===0?' danger':left<=2?' warn':'');

  if(!isPrem)q('quota-upgrade-btn').style.display='';

  var canvas=q('quota-canvas');
  if(canvas){
    var ctx=canvas.getContext('2d');
    var cx=30,cy=30,r=22,th=6;
    ctx.clearRect(0,0,60,60);
    ctx.beginPath();ctx.lineWidth=th;ctx.strokeStyle='#e8e8e8';
    ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
    var color=left===0?'#b91c1c':left<=2?'#b45309':'#FF5C00';
    var filled=limit>0?(used/limit):0;
    if(filled>0){
      ctx.beginPath();ctx.strokeStyle=color;ctx.lineCap='round';ctx.lineWidth=th;
      ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*Math.min(filled,1));ctx.stroke();
    }
  }
}

function renderScans(scans){
  var list=q('scan-list');
  if(!scans.length){
    list.innerHTML='<div class="scan-empty">No scans yet.<br>Head to <a href="/idea-test" style="color:var(--acc)">PrintChecker</a> to analyse your first model.</div>';
    return;
  }
  list.innerHTML=scans.map(function(s){
    var score=s.score!=null?s.score:'?';
    var cls=score==='?'?'ok':score>=70?'good':score>=40?'ok':'bad';
    var date='';
    if(s.created_at){try{date=new Date(s.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}catch(e){}}
    var host='';
    try{host=new URL(s.url).hostname.replace('www.','');}catch(e){host=s.url||'';}
    var title=s.title||host||'Unknown model';
    var verdict=s.verdict||'';
    return '<div class="scan-card">'
      +'<div class="scan-score '+cls+'">'+score+'</div>'
      +'<div class="scan-info">'
      +'<div class="scan-title">'+esc(title)+'</div>'
      +'<div class="scan-meta">'+esc(host)+(date?' · '+date:'')+'</div>'
      +(verdict?'<div class="scan-verdict">'+esc(verdict)+'</div>':'')
      +'</div></div>';
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function gateSignIn(){
  var email=q('g-email').value.trim();
  var pwd=q('g-pwd').value;
  var msg=q('g-msg');
  var btn=q('g-btn');
  if(!email||!pwd){msg.className='auth-msg error';msg.textContent='Please fill in all fields.';return;}
  btn.disabled=true;btn.querySelector('span').textContent='Signing in…';
  sb.auth.signInWithPassword({email:email,password:pwd}).then(function(res){
    btn.disabled=false;btn.querySelector('span').textContent='Sign in';
    if(res.error){msg.className='auth-msg error';msg.textContent=res.error.message;return;}
    authUser=res.data.user;
    q('auth-gate').style.display='none';
    loadDashboard();
  });
}

function togglePwForm(){
  q('pw-form').classList.toggle('open');
}

function changePassword(){
  var np=q('pw-new').value;
  var cp=q('pw-confirm').value;
  var msg=q('pw-msg');
  var btn=q('pw-btn');
  msg.className='pw-msg';msg.textContent='';
  if(!np||!cp){msg.className='pw-msg error';msg.textContent='Please fill in both fields.';return;}
  if(np!==cp){msg.className='pw-msg error';msg.textContent='Passwords do not match.';return;}
  if(np.length<6){msg.className='pw-msg error';msg.textContent='Password must be at least 6 characters.';return;}
  btn.disabled=true;btn.querySelector('span').textContent='Updating…';
  sb.auth.updateUser({password:np}).then(function(res){
    btn.disabled=false;btn.querySelector('span').textContent='Update password';
    if(res.error){msg.className='pw-msg error';msg.textContent=res.error.message;return;}
    msg.className='pw-msg success';msg.textContent='Password updated!';
    q('pw-new').value='';q('pw-confirm').value='';
  });
}

function doSignOut(){
  sb.auth.signOut().then(function(){
    window.location.href='/idea-test';
  });
}
</script>
</body>
</html>
