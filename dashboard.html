<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Meshminds</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --o:#FF5C00;--bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);
  --t:#f0f0f0;--t2:#aaa;--t3:#555;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:var(--fb);padding-bottom:60px}
.header{padding:16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
.logo{font-family:var(--fd);font-size:18px;letter-spacing:1px}
.logo span{color:var(--o)}
.logo-sub{font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.refresh-btn{background:var(--s2);border:1px solid var(--b2);color:var(--t2);font-family:var(--fb);font-size:12px;font-weight:600;padding:7px 12px;border-radius:var(--r);cursor:pointer}
.refresh-btn.loading{opacity:.4;pointer-events:none}
.status-bar{padding:8px 16px;font-size:12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--b)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.live{background:var(--green);animation:blink 2s infinite}
.dot.err{background:var(--red)}
.dot.loading{background:var(--yellow)}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
.main{padding:16px;max-width:560px;margin:0 auto}
.section-title{font-family:var(--fd);font-size:20px;letter-spacing:.5px;margin-bottom:12px;color:var(--t)}
.err-card{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--r);padding:14px;margin-bottom:16px;font-size:13px;color:var(--red);line-height:1.7}
.err-card code{font-family:var(--fm);font-size:11px;background:rgba(239,68,68,.1);padding:2px 5px;border-radius:3px;word-break:break-all}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-box{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:14px}
.sb-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.sb-value{font-family:var(--fd);font-size:30px;line-height:1;color:var(--t)}
.sb-sub{font-size:11px;color:var(--t3);margin-top:3px}
.sb-delta{font-size:11px;margin-top:3px;font-weight:600}
.sb-delta.up{color:var(--green)}
.sb-delta.down{color:var(--red)}
.sb-delta.flat{color:var(--t3)}
.chart-card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:20px}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.chart-title{font-size:13px;font-weight:600}
.chart-wrap{position:relative;height:90px}
canvas#clickChart{width:100%!important;height:90px!important}
.funnel{display:flex;flex-direction:column;gap:5px;margin-bottom:20px}
.funnel-row{display:flex;align-items:center;gap:8px}
.funnel-label{font-size:12px;color:var(--t2);width:120px;flex-shrink:0}
.funnel-bar-wrap{flex:1;height:18px;background:var(--s2);border-radius:3px;overflow:hidden}
.funnel-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:5px;min-width:0}
.funnel-fill span{font-size:10px;font-weight:700;color:rgba(255,255,255,.7)}
.funnel-pct{font-size:10px;color:var(--t3);width:26px;text-align:right;flex-shrink:0}
.recs{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.rec{background:var(--s1);border-radius:var(--r);padding:14px;border-left:3px solid transparent}
.rec.green{border-color:var(--green)}
.rec.yellow{border-color:var(--yellow)}
.rec.blue{border-color:var(--blue)}
.rec.red{border-color:var(--red)}
.rec-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.rec-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.rec-title{font-size:13px;font-weight:700;line-height:1.3}
.rec-body{font-size:12px;color:var(--t2);line-height:1.55;margin-bottom:8px}
.rec-action{font-size:12px;font-weight:700;padding:6px 12px;border-radius:6px;display:inline-block;border:1px solid transparent}
.rec.green .rec-action{color:var(--green);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.06)}
.rec.yellow .rec-action{color:var(--yellow);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06)}
.rec.blue .rec-action{color:var(--blue);border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.06)}
.rec.red .rec-action{color:var(--red);border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)}
.rec-code{font-family:var(--fm);font-size:11px;background:var(--s2);border:1px solid var(--b2);border-radius:4px;padding:2px 6px;display:inline}
.events-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.events-table th{font-size:10px;color:var(--t3);text-align:left;padding:5px 8px;border-bottom:1px solid var(--b);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.events-table td{padding:8px 8px;font-size:12px;border-bottom:1px solid var(--b);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
.empty{text-align:center;padding:32px 16px;color:var(--t3);font-size:13px}
.loading-state{text-align:center;padding:60px 16px;color:var(--t3);font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo"><span>MESH</span>MINDS</div>
    <div class="logo-sub">Analytics</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="last-update" style="font-size:11px;color:var(--t3)">—</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="status-bar">
  <div class="dot loading" id="conn-dot"></div>
  <span id="conn-label" style="color:var(--t3)">Connecting…</span>
</div>

<div class="main" id="dashboard-content">
  <div class="loading-state">Loading data…</div>
</div>

<script>
// ── DATA SOURCE ──
// Same Apps Script URL used by n8n — handles both POST (write) and GET (read)
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyYX18EH7wJxAXgP4sj8OGYqdLedIBjblRc2AyLu1mBaFZNmp3lilNLFtgAuK90hxu3/exec';

// ── COLUMN MAPPING ──
// Your columns: Timestamp | UID | Variant | email | Action | Button | Link | Where do they come from? | Device | Screen width
function normaliseRow(row){
  return {
    ts:     row['Timestamp'] || '',
    uid:    row['UID']       || '',
    email:  row['email']     || '',
    action: (row['Action']   || '').toLowerCase().trim(),
    button: row['Button']    || '',
    link:   row['Link']      || '',
    source: row['Where do they come from?'] || '',
    device: row['Device']    || '',
  };
}

// ── FETCH FROM APPS SCRIPT ──
async function loadFromSheets(){
  const res = await fetch(SHEETS_URL);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if(!json.rows) throw new Error('Unexpected response — redeploy the Apps Script (Deploy → Manage deployments → New version)');
  return json.rows.map(normaliseRow);
}

// ── PROCESS ──
function processEvents(events){
  const now = Date.now();
  const ago30 = now - 30*86400000;
  const ago15 = now - 15*86400000;

  const uids = new Set(), emails = new Set();
  let visits=0, quizDone=0, emailCaptures=0, offerClicks=0, toolkitClicks=0;
  const clicksByDay={}, sources={};
  let clicks30=0, clicksPrev15=0, clicksRecent15=0;

  events.forEach(e => {
    if(e.uid)   uids.add(e.uid);
    if(e.email) emails.add(e.email.toLowerCase());

    const ts = e.ts ? new Date(e.ts).getTime() : 0;
    const a  = e.action;

    if(a==='visit'||a==='new_visitor') visits++;
    if(a==='quiz_complete')  quizDone++;
    if(a==='email_capture'||e.email)   emailCaptures++;
    if(a==='offer_click')    offerClicks++;
    if(a==='toolkit_click')  toolkitClicks++;

    // Any click action (offer, button, link)
    const isClick = a==='offer_click' || a==='button_click' || e.button || e.link;
    if(isClick && ts >= ago30){
      clicks30++;
      const day = new Date(ts).toISOString().slice(0,10);
      clicksByDay[day] = (clicksByDay[day]||0) + 1;
      if(ts < ago15) clicksPrev15++;
      else           clicksRecent15++;
    }

    // Traffic source
    if(e.source){
      const s = e.source.includes('instagram') ? 'Instagram' :
                e.source.includes('tiktok')    ? 'TikTok'    :
                e.source==='(direct)'          ? 'Direct'    : 'Other';
      sources[s] = (sources[s]||0)+1;
    }
  });

  // De-duplicate email captures using the email column
  const uniqueEmails = emails.size || emailCaptures;

  return {
    total: events.length,
    uniqueVisitors: uids.size,
    visits, quizDone,
    uniqueEmails, offerClicks, toolkitClicks,
    clicksByDay, clicks30, clicksPrev15, clicksRecent15,
    sources,
  };
}

// ── RECOMMENDATIONS ──
function buildRecs(s){
  const base = Math.max(s.visits, 1);
  const emailRate   = s.uniqueEmails / base;
  const offerRate   = s.offerClicks  / base;
  const quizRate    = s.quizDone     / base;
  const toolkitRate = s.toolkitClicks / Math.max(s.uniqueEmails, 1);
  const trend       = s.clicksRecent15 - s.clicksPrev15;
  const recs = [];

  if(s.visits < 30){
    recs.push({type:'blue', icon:'ℹ️',
      title:'Not enough data yet',
      body:`${s.visits} visits logged. Recommendations become reliable at 100+. Keep posting.`,
      action:'Get more traffic',
      steps:`Post a carousel ending with "take the quiz — link in bio". Stories with a link sticker also work well.`
    });
    return recs;
  }

  if(offerRate > 0.18)
    recs.push({type:'green', icon:'📈',
      title:'Offer converting well — move it higher',
      body:`Offer click rate is ${(offerRate*100).toFixed(1)}% (benchmark ~10–15%). Moving the offer above the email gate could increase revenue directly.`,
      action:'How to move it up',
      steps:`In <span class="rec-code">variant-a.html</span> find <span class="rec-code">id="email-commercial"</span> and paste the <span class="rec-code">.product</span> div above it.`
    });

  if(emailRate > 0.28 && offerRate < 0.08)
    recs.push({type:'yellow', icon:'🚪',
      title:'Email gate may be blocking offer clicks',
      body:`Email rate is high (${(emailRate*100).toFixed(0)}%) but offer clicks are low (${(offerRate*100).toFixed(0)}%). Users submit email but don't continue to the offer.`,
      action:'What to test',
      steps:`Move <span class="rec-code">id="email-commercial"</span> below the offer, or remove it temporarily and compare offer clicks over the next 7 days.`
    });

  if(quizRate < 0.45 && s.quizDone > 5)
    recs.push({type:'yellow', icon:'🎯',
      title:'Quiz drop-off is high',
      body:`Only ${(quizRate*100).toFixed(0)}% of visitors finish the quiz. Removing one step typically improves completion by 15–25%.`,
      action:'What to remove',
      steps:`In <span class="rec-code">variant-a.html</span>, in the <span class="rec-code">nextStep()</span> function, remove the <span class="rec-code">can_design</span> step from the commercial path.`
    });

  if(emailRate > 0.25)
    recs.push({type:'green', icon:'📬',
      title:'Email capture is strong',
      body:`${(emailRate*100).toFixed(0)}% of visitors give their email. Make sure the n8n welcome sequence fires within 5 minutes of signup.`,
      action:'Check n8n',
      steps:`Verify the <span class="rec-code">/webhook/email-capture</span> trigger in n8n has an active email node. Check for errors in the execution log.`
    });

  if(toolkitRate > 0.35 && s.uniqueEmails > 10)
    recs.push({type:'blue', icon:'🛠️',
      title:'Toolkit is popular — surface it earlier',
      body:`${(toolkitRate*100).toFixed(0)}% of email submitters open the toolkit. Mentioning it before the gate would increase email signups.`,
      action:'What to change',
      steps:`Add "Free toolkit inside →" to the result title in <span class="rec-code">showCommercialResult()</span>, just above the email gate div.`
    });

  if(trend < -3 && s.clicks30 > 10)
    recs.push({type:'red', icon:'📉',
      title:'Clicks declining',
      body:`Last 15 days: ${s.clicksRecent15} clicks vs ${s.clicksPrev15} the 15 days before. Something changed — traffic or offer.`,
      action:'What to check',
      steps:`1. Check if Instagram reach dropped. 2. Refresh the offer headline in <span class="rec-code">.prod-title</span>. 3. Consider testing a lower price.`
    });

  if(trend > 3)
    recs.push({type:'green', icon:'🚀',
      title:'Clicks trending up',
      body:`Clicks grew from ${s.clicksPrev15} → ${s.clicksRecent15}. Don't change the offer — focus on more traffic.`,
      action:'Keep going',
      steps:`Post more Instagram carousels and add the quiz URL to your TikTok bio.`
    });

  if(!recs.length)
    recs.push({type:'blue', icon:'✓',
      title:'Metrics look stable',
      body:`No urgent actions. Check back as more data comes in.`,
      action:'Nothing urgent',
      steps:`Keep driving traffic. Come back when you have 200+ visits for deeper insights.`
    });

  return recs;
}

// ── CHART ──
function drawChart(clicksByDay){
  const canvas = document.getElementById('clickChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = 90;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const days = [];
  const now = new Date();
  for(let i=29;i>=0;i--){
    days.push(new Date(now - i*86400000).toISOString().slice(0,10));
  }
  const vals = days.map(d => clicksByDay[d]||0);
  const maxVal = Math.max(...vals, 1);
  const pad = {t:6,r:2,b:18,l:2};
  const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;
  const slotW = cW/30, barW = Math.max(1, slotW-2);

  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l, pad.t+cH/2); ctx.lineTo(pad.l+cW, pad.t+cH/2); ctx.stroke();

  vals.forEach((v,i)=>{
    const x=pad.l+i*slotW+(slotW-barW)/2;
    const bH=v>0?Math.max(3,(v/maxVal)*cH):0;
    const y=pad.t+cH-bH;
    ctx.fillStyle = i>=15 ? '#FF5C00' : 'rgba(255,92,0,0.35)';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(x,y,barW,bH,2); else ctx.rect(x,y,barW,bH);
    ctx.fill();
  });

  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.font=`9px 'DM Mono',monospace`;
  ctx.textAlign='center';
  [0,14,29].forEach(i=>{
    ctx.fillText(days[i].slice(5), pad.l+i*slotW+slotW/2, H-2);
  });
}

// ── RENDER ──
function render(events){
  const s = processEvents(events);
  const base      = Math.max(s.visits, 1);
  const emailRate = (s.uniqueEmails / base * 100).toFixed(1);
  const offerRate = (s.offerClicks  / base * 100).toFixed(1);
  const quizRate  = (s.quizDone     / base * 100).toFixed(1);
  const trend     = s.clicksRecent15 - s.clicksPrev15;
  const trendPct  = s.clicksPrev15 > 0 ? Math.round(trend/s.clicksPrev15*100) : 0;
  const deltaIcon = trend>0?'↑':trend<0?'↓':'→';
  const deltaCls  = trend>0?'up':trend<0?'down':'flat';
  const recs      = buildRecs(s);

  let html = '';

  // Stats
  html += `<div class="stat-row">
    <div class="stat-box">
      <div class="sb-label">Visits</div>
      <div class="sb-value">${s.visits}</div>
      <div class="sb-sub">${s.uniqueVisitors} unique IDs</div>
    </div>
    <div class="stat-box">
      <div class="sb-label">Emails</div>
      <div class="sb-value">${s.uniqueEmails}</div>
      <div class="sb-sub">${emailRate}% of visits</div>
    </div>
    <div class="stat-box">
      <div class="sb-label">Offer clicks</div>
      <div class="sb-value">${s.offerClicks}</div>
      <div class="sb-sub">${offerRate}% rate</div>
    </div>
    <div class="stat-box">
      <div class="sb-label">Quiz done</div>
      <div class="sb-value">${s.quizDone}</div>
      <div class="sb-sub">${quizRate}% of visits</div>
    </div>
  </div>`;

  // Chart
  html += `<div class="section-title">CLICKS · LAST 30 DAYS</div>
  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title">${s.clicks30} total clicks</div>
        <div class="sb-delta ${deltaCls}" style="font-size:11px;margin-top:3px">${deltaIcon} ${Math.abs(trendPct)}% vs previous 15 days</div>
      </div>
      <div style="font-size:10px;color:var(--t3);text-align:right;line-height:1.8">
        <span style="color:var(--o)">■</span> recent 15d<br>
        <span style="color:rgba(255,92,0,0.4)">■</span> older 15d
      </div>
    </div>
    <div class="chart-wrap"><canvas id="clickChart"></canvas></div>
  </div>`;

  // Funnel
  const steps = [
    {label:'Visits',          val:s.visits},
    {label:'Quiz completed',  val:s.quizDone},
    {label:'Email captured',  val:s.uniqueEmails},
    {label:'Offer clicked',   val:s.offerClicks},
    {label:'Toolkit opened',  val:s.toolkitClicks},
  ];
  const fMax = steps[0].val || 1;
  html += `<div class="section-title">FUNNEL</div><div class="funnel">`;
  steps.forEach(st => {
    const pct = Math.round(st.val/fMax*100);
    html += `<div class="funnel-row">
      <div class="funnel-label">${st.label}</div>
      <div class="funnel-bar-wrap">
        <div class="funnel-fill" style="width:${pct}%;background:rgba(255,92,0,0.4)">
          <span>${st.val}</span>
        </div>
      </div>
      <div class="funnel-pct">${pct}%</div>
    </div>`;
  });
  html += `</div>`;

  // Traffic sources
  const srcEntries = Object.entries(s.sources).sort((a,b)=>b[1]-a[1]);
  if(srcEntries.length){
    const srcTotal = srcEntries.reduce((acc,[,v])=>acc+v,0)||1;
    html += `<div class="section-title">TRAFFIC SOURCES</div><div class="funnel">`;
    srcEntries.forEach(([src,cnt])=>{
      const pct = Math.round(cnt/srcTotal*100);
      html += `<div class="funnel-row">
        <div class="funnel-label">${src}</div>
        <div class="funnel-bar-wrap">
          <div class="funnel-fill" style="width:${pct}%;background:rgba(59,130,246,0.4)">
            <span>${cnt}</span>
          </div>
        </div>
        <div class="funnel-pct">${pct}%</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Recommendations
  html += `<div class="section-title">RECOMMENDATIONS</div><div class="recs">`;
  recs.forEach(r => {
    html += `<div class="rec ${r.type}">
      <div class="rec-header">
        <span class="rec-icon">${r.icon}</span>
        <div class="rec-title">${r.title}</div>
      </div>
      <div class="rec-body">${r.body}</div>
      <div><span class="rec-action">${r.action} →</span></div>
      <div style="font-size:12px;color:var(--t2);margin-top:8px;line-height:1.6">${r.steps}</div>
    </div>`;
  });
  html += `</div>`;

  // Recent events
  const recent = [...events].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,20);
  html += `<div class="section-title">RECENT EVENTS</div>`;
  if(recent.length){
    html += `<table class="events-table">
      <thead><tr><th>Time</th><th>Action</th><th>Source</th><th>Device</th></tr></thead><tbody>`;
    recent.forEach(e => {
      const d   = e.ts ? new Date(e.ts) : null;
      const t   = d ? d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' '+d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) : '—';
      const src = e.source.includes('instagram')?'Instagram':e.source.includes('tiktok')?'TikTok':e.source==='(direct)'?'Direct':e.source?e.source.slice(0,18):'—';
      const dev = e.device.includes('iPhone')||e.device.includes('Android')?'📱 Mobile':e.device?'💻 Desktop':'—';
      html += `<tr>
        <td style="font-family:var(--fm);font-size:11px;color:var(--t3)">${t}</td>
        <td>${e.action||'—'}</td>
        <td style="color:var(--t3)">${src}</td>
        <td style="color:var(--t3)">${dev}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else {
    html += `<div class="empty">No events yet.</div>`;
  }

  document.getElementById('dashboard-content').innerHTML = html;
  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  requestAnimationFrame(() => drawChart(s.clicksByDay));
}

// ── LOAD ──
async function loadData(){
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading'); btn.textContent='↻ Loading…';
  document.getElementById('conn-dot').className='dot loading';
  try{
    const events = await loadFromSheets();
    document.getElementById('conn-dot').className='dot live';
    document.getElementById('conn-label').textContent=`Live — ${events.length} rows loaded`;
    render(events);
  } catch(err){
    document.getElementById('conn-dot').className='dot err';
    document.getElementById('conn-label').textContent='Connection error';
    document.getElementById('dashboard-content').innerHTML=`
      <div class="err-card">
        <strong>Could not load data</strong><br><br>
        ${err.message}<br><br>
        <strong>Fix:</strong> In the Apps Script editor go to<br>
        Deploy → Manage deployments → create a new version → Deploy<br>
        Make sure "Who has access" is set to <strong>Anyone</strong>.<br><br>
        URL in use:<br><code>${SHEETS_URL}</code>
      </div>`;
  }
  btn.classList.remove('loading'); btn.textContent='↻ Refresh';
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
