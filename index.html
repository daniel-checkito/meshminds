<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meshminds — Find Your 3D Printing Path</title>
<style>
body { background: #0a0a0a; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.loader { text-align: center; }
.dot { width: 8px; height: 8px; background: #FF5C00; border-radius: 50%; display: inline-block; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</head>
<body>
<div class="loader"><div class="dot"></div></div>
<script>
(function(){
  const N8N = 'https://meshminds.app.n8n.cloud/webhook/ab-track';
  let uid = localStorage.getItem('mm_uid');
  if(!uid){ uid = 'u_' + Math.random().toString(36).slice(2,10); localStorage.setItem('mm_uid', uid); }
  fetch(N8N, { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({event:'page_view', variant:'a', uid, ref: document.referrer||'direct', ts: new Date().toISOString()})
  }).catch(()=>{});
  window.location.replace('variant-a.html?v=a&uid=' + uid);
})();
</script>
</body>
</html>
