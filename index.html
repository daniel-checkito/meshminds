<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meshminds - Make money 3d printing</title>
<style>
body{background:#0a0a0a;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.dot{width:8px;height:8px;background:#FF5C00;border-radius:50%;display:inline-block;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div class="dot"></div>
<script>
(function(){
  // Assign persistent user ID
  let uid = localStorage.getItem('mm_uid');
  if(!uid){ uid='u_'+Math.random().toString(36).slice(2,10); localStorage.setItem('mm_uid',uid); }
  localStorage.setItem('mm_variant','a');
  // Redirect immediately — everyone goes to variant-a
  window.location.replace('variant-a.html?uid='+uid);
})();
</script>
</body>
</html>
