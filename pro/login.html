<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Member Login - MeshMinds</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#FF5C00;--ink:#0a0a0a;--ink2:#555;--ink3:#888;--line:#e5e2dd;--line2:#d4d0ca;--surf:#f7f5f2;--surf2:#eeece9;--bad:#b91c1c}
body{min-height:100vh;background:#fff;font-family:"Manrope",sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:380px}
.logo-row{text-align:center;margin-bottom:32px}
.logo{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.04em;color:var(--ink)}
.logo em{font-style:normal;color:var(--acc)}
.pro-pill{display:inline-block;background:var(--acc);color:#fff;font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;border-radius:20px;padding:2px 8px;margin-left:6px;vertical-align:middle}
.card{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:28px 24px}
.card-title{font-family:"Bebas Neue",sans-serif;font-size:32px;line-height:1;margin-bottom:6px;color:var(--ink)}
.card-sub{font-size:13px;color:var(--ink2);margin-bottom:24px;line-height:1.5}
.field-label{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;display:block}
.email-input{width:100%;background:#fff;border:1.5px solid var(--line2);border-radius:10px;padding:13px 14px;font-family:"Manrope",sans-serif;font-size:15px;color:var(--ink);outline:none;transition:border-color .2s;margin-bottom:14px}
.email-input:focus{border-color:var(--acc)}
.submit-btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:14px;font-family:"Manrope",sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:opacity .15s;position:relative}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.err-msg{font-size:12px;color:var(--bad);margin-top:10px;min-height:16px;text-align:center}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:var(--ink3);font-size:11px;font-family:"DM Mono",monospace}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.new-member-btn{display:block;text-align:center;background:#fff;border:1.5px solid var(--line2);border-radius:10px;padding:13px;font-weight:700;font-size:14px;color:var(--ink);text-decoration:none;transition:border-color .2s}
.new-member-btn:hover{border-color:var(--acc);color:var(--acc)}
.back-link{text-align:center;margin-top:20px;font-size:12px;color:var(--ink3);font-family:"DM Mono",monospace}
.back-link a{color:var(--ink2);text-decoration:none}
.back-link a:hover{color:var(--ink)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <span class="logo">Mesh<em>Minds</em></span>
    <span class="pro-pill">PRO</span>
  </div>
  <div class="card">
    <div class="card-title">Member<br>Login</div>
    <div class="card-sub">Already subscribed? Enter your email to restore access.</div>
    <label class="field-label" for="email-inp">Your email address</label>
    <input id="email-inp" class="email-input" type="email" placeholder="you@example.com" autocomplete="email" autofocus>
    <button class="submit-btn" id="submit-btn" onclick="doLogin()">Restore access →</button>
    <div class="err-msg" id="err-msg"></div>
    <div class="divider">or</div>
    <a href="https://buy.stripe.com/PLACEHOLDER" class="new-member-btn" id="new-member-link">New member - $9/month →</a>
  </div>
  <div class="back-link">
    <a href="/idea">← Back to PrintChecker</a>
  </div>
</div>

<script>
// Load Stripe payment link from config if available
var stripeLink = localStorage.getItem('mm_stripe_link');
if (stripeLink) document.getElementById('new-member-link').href = stripeLink;

function doLogin() {
  var email = document.getElementById('email-inp').value.trim();
  if (!email || !email.includes('@')) {
    setErr('Please enter a valid email address.');
    return;
  }
  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Checking…';
  setErr('');

  fetch('/api/pro-login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email }),
  })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.ok || !d.token) {
        setErr(d.error || 'No active membership found for this email.');
        btn.disabled = false;
        btn.textContent = 'Restore access →';
        return;
      }
      localStorage.setItem('mm_pro_token', d.token);
      location.href = '/pro/dashboard';
    })
    .catch(function(){
      setErr('Network error - please try again.');
      btn.disabled = false;
      btn.textContent = 'Restore access →';
    });
}

function setErr(msg) {
  document.getElementById('err-msg').textContent = msg;
}

document.getElementById('email-inp').addEventListener('keydown', function(e){
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
