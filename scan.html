<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="index,follow">
<title>3D Print Scan – Meshminds</title>
<meta name="description" content="See the full Meshminds analysis for this 3D print idea — Etsy demand, profit estimate, IP risk and the next 3 steps to sell it.">
<meta property="og:type" content="article">
<meta property="og:title" content="3D Print Scan – Meshminds">
<meta property="og:description" content="See the full Meshminds analysis for this 3D print idea.">
<link rel="canonical" href="https://meshminds.vercel.app/scan/">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@500;700&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1a1a;--ink2:#3a3a3a;--ink3:#7a7a7a;--line:#e7e5e1;--line2:#cfcdc8;--surf:#fafaf7;--surf2:#f1efe9;--acc:#ff5c00;--good:#15803d;--bad:#b91c1c}
  *{box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;color:var(--ink);background:#fdfcfa;margin:0;padding:24px 16px 80px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:780px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.03em}
  .topbar a{color:var(--ink);text-decoration:none}
  .topbar a:hover{color:var(--acc)}
  .head{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
  .thumb{width:84px;height:84px;border-radius:11px;background:var(--surf2) center/cover no-repeat;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--ink3);border:1px solid var(--line)}
  .head-body{flex:1;min-width:0}
  .cat{font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:6px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1.05;letter-spacing:.02em;color:var(--ink);margin:0 0 8px;word-break:break-word}
  .score-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .score-num{font-family:'Bebas Neue',sans-serif;font-size:54px;line-height:1}
  .verdict-pill{font-size:11px;font-weight:700;border-radius:6px;padding:4px 10px}
  .sec{margin-top:24px}
  .sec-h{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.02em;color:var(--ink);margin:0 0 10px;line-height:1.1;display:flex;align-items:center;gap:10px}
  .sec-h::after{content:'';flex:1;height:1px;background:var(--line)}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stat{background:var(--surf);border-radius:9px;padding:11px 13px}
  .stat-v{font-family:'DM Mono',monospace;font-size:18px;font-weight:800;line-height:1;margin-bottom:3px}
  .stat-l{font-size:11.5px;color:var(--ink3)}
  .insight{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #bbf7d0;border-radius:10px;padding:13px 14px;font-size:14px;line-height:1.55}
  .insight.warn{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fde68a}
  .insight.bad{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#fca5a5}
  .cta{background:linear-gradient(135deg,#fff3e6,#fdfaf8);border:1px solid rgba(255,92,0,.25);border-radius:11px;padding:18px 16px;margin-top:30px;text-align:center}
  .cta-eyebrow{font-size:11px;font-weight:800;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--acc);margin-bottom:6px}
  .cta-h{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.02em;line-height:1.05;margin-bottom:8px}
  .cta-sub{font-size:14px;color:var(--ink2);margin-bottom:14px;line-height:1.5}
  .btn{display:inline-block;padding:13px 26px;background:var(--acc);color:#fff;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;text-align:center;cursor:pointer;text-decoration:none}
  .source-link{display:inline-block;font-family:'DM Mono',monospace;font-size:12px;color:var(--acc);text-decoration:none;margin-top:6px;word-break:break-all}
  .source-link:hover{text-decoration:underline}
  .err{padding:40px 20px;text-align:center;color:var(--ink3);font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a href="/idea">← Meshminds</a>
    <a href="/idea" style="font-size:13px;color:var(--acc);font-weight:700;font-family:'DM Sans',sans-serif">Scan your own →</a>
  </div>
  <div id="content" style="display:none"></div>
  <div id="err" class="err" style="display:none">This scan isn't available — it may be private or the link may be wrong. <a href="/idea" style="color:var(--acc);font-weight:700">Scan a new idea →</a></div>
  <div id="loading" class="err">Loading…</div>
</div>

<script>
'use strict';

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function classFor(s){if(s>=70)return 'g';if(s>=50)return 'y';return 'r';}
function colorFor(s){if(s>=70)return '#15803d';if(s>=50)return '#b45309';return '#b91c1c';}
function bgFor(s){if(s>=70)return '#dcfce7';if(s>=50)return '#fef9c3';return '#fee2e2';}
function fmt(n){if(n==null)return '-';n=Number(n);if(!isFinite(n))return '-';if(n>=1000)return (n/1000).toFixed(n>=10000?0:1)+'k';return String(Math.round(n));}

function getScanId(){
  var url=new URL(location.href);
  var q=url.searchParams.get('id');
  if(q)return q;
  // Fallback: parse /scan/<id> from the path in case rewrite isn't applied
  var m=location.pathname.match(/\/scan\/([\w-]+)$/);
  return m?m[1]:null;
}

async function load(){
  var id=getScanId();
  if(!id){showErr('No scan id');return;}
  try{
    var r=await fetch('/api/account/ideas?publicScan='+encodeURIComponent(id));
    if(!r.ok){showErr();return;}
    var data=await r.json();
    if(!data || !data.scan){showErr();return;}
    render(data.scan);
  }catch(e){
    showErr();
  }
}

function showErr(){
  document.getElementById('loading').style.display='none';
  document.getElementById('err').style.display='';
}

function render(scan){
  document.getElementById('loading').style.display='none';
  var content=document.getElementById('content');
  var fd=scan.full_data||{};
  var product=fd.product||{};
  var market=fd.market||{};
  var revenue=fd.revenue||{};
  var copyright=fd.copyright||{};
  var score=Number(scan.score)||0;
  var verdict=scan.verdict||'';
  var title=scan.title||product.title||'3D Print Scan';
  var img=scan.image_url||product.image||'';
  var cat=fd.category||product.category||'';

  // Update document head for SEO + social previews
  document.title=title+' — Score '+score+' · Meshminds';
  setMeta('description','Score '+score+' on Meshminds. '+(verdict||'')+' '+(market.insight||product.note||'').replace(/<[^>]+>/g,'').slice(0,120));
  setOg('og:title',title+' — Score '+score+' · Meshminds');
  setOg('og:description','Score '+score+' on Meshminds. '+(verdict||''));
  if(img)setOg('og:image',img);
  var canon=document.querySelector('link[rel=canonical]');
  if(canon)canon.href='https://meshminds.vercel.app/scan/'+scan.id;

  var ipFlag=(copyright.etsyBanRisk||'').toLowerCase()==='high'||(copyright.copyrightRisk||'').toLowerCase()==='high';
  var insightCls=score>=70?'':score>=50?'warn':'bad';

  var html=
    '<div class="head">'+
      (img?'<div class="thumb" style="background-image:url(\''+escH(img)+'\')"></div>':'<div class="thumb">🖼</div>')+
      '<div class="head-body">'+
        (cat?'<div class="cat">'+escH(String(cat).replace(/_/g,' '))+'</div>':'')+
        '<h1>'+escH(title)+'</h1>'+
        '<div class="score-row">'+
          '<div class="score-num" style="color:'+colorFor(score)+'">'+score+'</div>'+
          '<span class="verdict-pill" style="background:'+bgFor(score)+';color:'+colorFor(score)+'">'+escH(verdict||'Verdict')+'</span>'+
          (ipFlag?'<span class="verdict-pill" style="background:#fee2e2;color:#991b1b">⚠ IP risk</span>':'')+
        '</div>'+
        (scan.url?'<a class="source-link" href="'+escH(scan.url)+'" target="_blank" rel="noopener">'+escH(scan.url.replace(/^https?:\/\//,'').slice(0,80))+'</a>':'')+
      '</div>'+
    '</div>';

  // Market data
  if(market.searchVolume||market.etsyListings||market.etsyAvgPrice){
    html+='<div class="sec"><div class="sec-h">Market data</div><div class="stat-grid">';
    if(market.searchVolume)html+='<div class="stat"><div class="stat-v">'+fmt(market.searchVolume)+'</div><div class="stat-l">Etsy searches/mo</div></div>';
    if(market.etsyListings)html+='<div class="stat"><div class="stat-v">'+fmt(market.etsyListings)+'</div><div class="stat-l">Competing listings</div></div>';
    if(market.etsyAvgPrice)html+='<div class="stat"><div class="stat-v">'+escH(market.etsyAvgPrice)+'</div><div class="stat-l">Avg price</div></div>';
    if(market.topSellerSales)html+='<div class="stat"><div class="stat-v">'+fmt(market.topSellerSales)+'</div><div class="stat-l">Top seller sales/mo</div></div>';
    html+='</div></div>';
  }

  // Insight
  var insight=market.insight||product.note||'';
  if(insight){
    html+='<div class="sec"><div class="sec-h">What we found</div>'+
      '<div class="insight '+insightCls+'">'+insight+'</div></div>';
  }

  // Revenue
  if(revenue.netProfit!=null||revenue.sellPrice||revenue.unitsPerMonth){
    html+='<div class="sec"><div class="sec-h">Estimated revenue</div><div class="stat-grid">';
    if(revenue.sellPrice)html+='<div class="stat"><div class="stat-v">'+escH(revenue.sellPrice)+'</div><div class="stat-l">Sell price</div></div>';
    if(revenue.unitsPerMonth!=null)html+='<div class="stat"><div class="stat-v">'+fmt(revenue.unitsPerMonth)+'</div><div class="stat-l">Units / mo</div></div>';
    if(revenue.grossRevenue!=null)html+='<div class="stat"><div class="stat-v">€'+fmt(revenue.grossRevenue)+'</div><div class="stat-l">Gross / mo</div></div>';
    if(revenue.netProfit!=null)html+='<div class="stat"><div class="stat-v" style="color:'+(revenue.netProfit>=0?'#15803d':'#b91c1c')+'">€'+fmt(revenue.netProfit)+'</div><div class="stat-l">Net profit / mo</div></div>';
    html+='</div></div>';
  }

  // Legal
  var legal=copyright.legalDesc||copyright.etsyBanReason||copyright.copyrightDesc||'';
  if(legal){
    html+='<div class="sec"><div class="sec-h">Legal &amp; copyright</div>'+
      '<div class="insight '+(ipFlag?'bad':'')+'">'+legal+'</div></div>';
  }

  // CTA
  html+='<div class="cta">'+
    '<div class="cta-eyebrow">This is what your scan looks like</div>'+
    '<div class="cta-h">Got an idea?<br>Get this same report.</div>'+
    '<div class="cta-sub">Free, takes 30 seconds. Score, demand, profit, legal risk and the next 3 steps to sell it.</div>'+
    '<a class="btn" href="/idea">Scan my idea →</a>'+
  '</div>';

  content.innerHTML=html;
  content.style.display='';
}

function setMeta(name,content){
  var el=document.querySelector('meta[name="'+name+'"]');
  if(el)el.setAttribute('content',content);
  else{var m=document.createElement('meta');m.setAttribute('name',name);m.setAttribute('content',content);document.head.appendChild(m);}
}
function setOg(prop,content){
  var el=document.querySelector('meta[property="'+prop+'"]');
  if(el)el.setAttribute('content',content);
  else{var m=document.createElement('meta');m.setAttribute('property',prop);m.setAttribute('content',content);document.head.appendChild(m);}
}

load();
</script>
</body>
</html>
