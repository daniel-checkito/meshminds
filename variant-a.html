<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meshminds</title>
<link rel="canonical" href="https://meshminds.vercel.app/">
<meta name="robots" content="noindex,follow">
<meta http-equiv="refresh" content="0;url=/">
<style>body{background:#0a0a0a;margin:0}</style>
</head>
<body>
<script>
  // Preserve uid if present in the old URL, then send to /
  try{
    const p = new URLSearchParams(location.search);
    const uid = p.get('uid');
    if(uid && !localStorage.getItem('mm_uid')) localStorage.setItem('mm_uid', uid);
  }catch(e){}
  location.replace('/');
</script>
</body>
</html>
